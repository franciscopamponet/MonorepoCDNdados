# =============================================================================
# Config template de um modelo (Rule 07 — pipeline config-driven).
#
# Todo caminho, tabela, hiperparâmetro e nome de recurso mora AQUI, nunca no código.
# O nome do arquivo bate com o nome do modelo (Rule 05):
#   config/<nome>.yaml  ↔  models/<nome>/
#
# Este é o "exemplo_modelo"; copie e renomeie para o seu modelo real.
# Validado por common.config.BaseModelConfig (ou um schema que o estenda).
# =============================================================================

# Nome do modelo. Deve bater com a pasta em models/<name>/ (Rule 05).
name: exemplo_modelo

# ---------------------------------------------------------------------------
# Fonte de dados (Decisão 3). O campo 'type' seleciona a implementação concreta
# em data/sources/. O restante dos campos é repassado à implementação.
# ---------------------------------------------------------------------------
data_source:
  type: parquet          # parquet (default local) | spark_table | sql
  path: data/raw/exemplo.parquet

  # --- Alternativa: tabela Spark (requer o extra 'spark'/'databricks') ---
  # type: spark_table
  # table: catalogo.schema.minha_tabela
  # write_mode: overwrite

  # --- Alternativa: banco SQL (requer sqlalchemy + driver) ---
  # type: sql
  # connection: postgresql+psycopg://user:pass@host:5432/db
  # query: SELECT * FROM minha_tabela
  # table: minha_tabela        # usado na escrita (e na leitura se não houver query)

# ---------------------------------------------------------------------------
# Tracking do MLflow (consumido só por common/tracking.py — Rule 01).
# databricks=false é o default seguro: backend SQLite local, experimento por nome
# simples. ATENÇÃO: o file store './mlruns' NÃO funciona mais (o MLflow o colocou
# em maintenance mode); use SQLite, que também habilita o Model Registry local.
# databricks=true ainda precisa de validação empírica (ver TODO em tracking.py).
# ---------------------------------------------------------------------------
tracking:
  experiment_name: exemplo_modelo
  databricks: false
  tracking_uri: sqlite:///mlflow.db
  # registry_uri: null

# Caminho de saída dos artefatos processados.
output_dir: data/processed

# ---------------------------------------------------------------------------
# Hiperparâmetros do modelo. Chaves livres; consumidas por build_model/train.
# Nada disso pode estar hardcoded no código (Rule 07).
# ---------------------------------------------------------------------------
params:
  # --- seleção de colunas (consumido por prepare_data) ---
  target: y                    # coluna alvo (obrigatório)
  features: [x1, x2, x3]       # opcional; default = todas as colunas menos o alvo

  # --- split (consumido por prepare_data, via common/splits.py) ---
  split: random                # random (default) | temporal
  test_size: 0.2
  random_state: 42
  # stratify_col: y            # só para split random
  # --- alternativa temporal ---
  # split: temporal
  # time_col: data
  # cutoff: "2024-03-01"       # ou use test_size no lugar de cutoff

  # --- hiperparâmetros do estimador (consumido por build_model) ---
  n_estimators: 100
  max_depth: 8
  # min_samples_leaf: 1
  # class_weight: balanced
