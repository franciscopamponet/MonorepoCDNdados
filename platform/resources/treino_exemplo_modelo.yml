# =============================================================================
# Job de treino do exemplo_modelo — casca OPCIONAL (toggle = Sim).
#
# Aponta para o ENTRYPOINT (entrypoints/run_serverless.py), nunca direto para o
# núcleo. O job passa apenas o caminho do config: toda a parametrização vive no
# YAML de config, não aqui (Rule 07).
#
# Convenção de nome (Rule 05): config/<modelo>.yaml ↔ models/<modelo>/
# PREENCHER NA CÓPIA: os valores marcados com <PREENCHER: ...>.
# =============================================================================

resources:
  jobs:
    treino_exemplo_modelo:
      name: "[${bundle.target}] treino_exemplo_modelo"

      # Serverless: sem job_clusters. O ambiente vem do environment abaixo.
      environments:
        - environment_key: padrao
          spec:
            client: "2"
            # Dependências derivadas do pyproject (Decisão 2). O wheel do projeto
            # é construído pelo bundle a partir do próprio pyproject.toml.
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: treino
          environment_key: padrao
          spark_python_task:
            python_file: ../../entrypoints/run_serverless.py
            parameters:
              - "--config"
              - "config/exemplo_modelo.yaml"

      # Notificações de falha do job.
      email_notifications:
        on_failure:
          - <PREENCHER: email-responsavel@exemplo.com>

      # Descomente para agendar. Sem isto, o job só roda sob demanda.
      # schedule:
      #   quartz_cron_expression: "0 0 6 * * ?"   # todo dia às 06:00
      #   timezone_id: America/Sao_Paulo

artifacts:
  default:
    type: whl
    build: uv build --wheel
    path: ..
